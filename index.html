<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handheld Heritage — 复古掌机 3D 博物馆</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/src/css/main.css" />
</head>
<body>

  <!-- ===== 顶部导航栏 ===== -->
  <nav class="navbar navbar-dark museum-navbar" aria-label="主导航">
    <div class="container-fluid">
      <a class="navbar-brand museum-brand" href="index.html">
        <i class="bi bi-controller" aria-hidden="true"></i>
        Handheld Heritage
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="about.html" class="btn btn-outline-light btn-sm">About</a>
      </div>
    </div>
  </nav>

  <!-- ===== 主体布局：左侧面板 + 3D 画布 ===== -->
  <div class="museum-layout">

    <!-- 左侧控制面板 -->
    <aside class="control-panel" aria-label="展品控制面板">

      <!-- 掌机切换 -->
      <section class="panel-section" aria-labelledby="console-select-heading">
        <h2 class="panel-heading" id="console-select-heading">展品选择</h2>
        <div class="console-buttons" role="group" aria-label="选择展品">
          <button
            class="btn-console active"
            data-console="gameboy"
            aria-pressed="true"
            tabindex="0"
          >
            <span class="console-year">1989</span>
            <span class="console-name">Game Boy</span>
          </button>
          <button
            class="btn-console"
            data-console="gba_sp"
            aria-pressed="false"
            tabindex="0"
          >
            <span class="console-year">2003</span>
            <span class="console-name">GBA SP</span>
          </button>
          <button
            class="btn-console"
            data-console="psp"
            aria-pressed="false"
            tabindex="0"
          >
            <span class="console-year">2004</span>
            <span class="console-name">PSP</span>
          </button>
        </div>
      </section>

      <!-- 相机预设 -->
      <section class="panel-section" aria-labelledby="camera-heading">
        <h2 class="panel-heading" id="camera-heading">相机视角</h2>
        <div id="camera-presets" class="camera-buttons" role="group" aria-label="相机预设视角">
          <!-- 由 JS 动态生成 -->
        </div>
      </section>

      <!-- 场景控制 -->
      <section class="panel-section" aria-labelledby="scene-controls-heading">
        <h2 class="panel-heading" id="scene-controls-heading">场景控制</h2>
        <div class="scene-controls">
          <button
            id="btn-wireframe"
            class="btn-museum"
            aria-pressed="false"
            title="切换线框模式"
          >
            <i class="bi bi-grid-3x3" aria-hidden="true"></i>
            线框模式
          </button>
          <button
            id="btn-light"
            class="btn-museum"
            aria-pressed="true"
            title="切换主光源"
          >
            <i class="bi bi-lightbulb" aria-hidden="true"></i>
            主光源
          </button>
          <button
            id="btn-bgm"
            class="btn-museum"
            aria-pressed="false"
            title="播放 BGM"
          >
            <i class="bi bi-music-note-beamed" aria-hidden="true"></i>
            BGM
          </button>
          <button
            id="btn-flip"
            class="btn-museum d-none"
            aria-label="GBA SP 翻盖动画"
            title="翻盖动画（仅 GBA SP）"
          >
            <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
            翻盖
          </button>
        </div>
      </section>

      <!-- 展品说明 -->
      <section class="panel-section info-section" aria-labelledby="info-heading">
        <h2 class="panel-heading" id="info-heading">展品信息</h2>
        <div id="console-info">
          <p class="info-name" id="info-name">—</p>
          <p class="info-year" id="info-year">—</p>
          <p class="info-desc" id="info-desc">选择左侧展品以查看详情。</p>
        </div>
      </section>

    </aside>

    <!-- 3D 画布区域 -->
    <main class="canvas-container" aria-label="3D 展示区域">
      <canvas id="three-canvas" aria-label="交互式 3D 掌机模型展示"></canvas>

      <!-- 加载进度遮罩 -->
      <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="加载中">
        <div class="loading-content">
          <div class="loading-spinner" aria-hidden="true"></div>
          <p id="loading-text" class="loading-text">正在加载展品…</p>
        </div>
      </div>
    </main>

  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <!-- 主入口（ES module） -->
  <script type="module" src="/src/js/main.js"></script>

</body>
</html>
